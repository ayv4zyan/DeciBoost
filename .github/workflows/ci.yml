name: CI

on:
  push:
    branches: [main, develop, "release/*"]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Run unit tests
        run: ./gradlew test --no-daemon

  lint-detekt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: chmod +x gradlew
      - name: Run detekt
        run: ./gradlew detekt --no-daemon

  instrumented-api36:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: chmod +x gradlew
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      # Emulator merge gate: RMS signal-present (0.05) + engine state — not absolute 0.85 (see DESIGN.md Layer 2).
      - name: Instrumented tests API 36
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          target: google_apis
          arch: x86_64
          ram-size: 4096
          disable-animations: true
          emulator-boot-timeout: 600
          emulator-options: -no-snapshot-save -no-window -no-boot-anim -noaudio -gpu swiftshader_indirect -camera-back none
          pre-emulator-launch-script: |
            sudo apt-get update
            sudo apt-get install -y libpulse0
          script: |
            set -eu
            adb shell settings put global window_animation_scale 0
            adb shell settings put global transition_animation_scale 0
            adb shell settings put global animator_duration_scale 0
            ./gradlew :app:assembleDebug :testing:audio-harness:assembleDebug --no-daemon
            harness_ok=false
            app_ok=false
            harness_rerun_done=false
            app_rerun_done=false
            attempt=0
            max_attempts=3
            while [ "$attempt" -lt "$max_attempts" ]; do
              attempt=$((attempt + 1))
              if [ "$harness_ok" = false ]; then
                harness_rerun_flag=""
                if [ "$harness_rerun_done" = false ]; then
                  harness_rerun_flag="--rerun-tasks"
                  harness_rerun_done=true
                fi
                if ./gradlew :testing:audio-harness:connectedDebugAndroidTest --no-daemon $harness_rerun_flag; then
                  harness_ok=true
                fi
              fi
              if [ "$harness_ok" = true ] && [ "$app_ok" = false ]; then
                app_rerun_flag=""
                if [ "$app_rerun_done" = false ]; then
                  app_rerun_flag="--rerun-tasks"
                  app_rerun_done=true
                fi
                if ./gradlew :app:connectedDebugAndroidTest --no-daemon $app_rerun_flag; then
                  app_ok=true
                fi
              fi
              if [ "$harness_ok" = true ] && [ "$app_ok" = true ]; then
                exit 0
              fi
              echo "Instrumented tests failed (attempt $attempt/$max_attempts), retrying in 15s..."
              sleep 15
            done
            exit 1
        timeout-minutes: 90
