name: Instrumented Matrix

on:
  schedule:
    - cron: "0 6 * * 1"
  push:
    branches: ["release/*"]
  workflow_dispatch:

jobs:
  instrumented-matrix:
    strategy:
      fail-fast: false
      matrix:
        api-level: [26, 34, 36]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: chmod +x gradlew
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Instrumented tests API ${{ matrix.api-level }}
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: google_apis
          arch: x86_64
          ram-size: 4096
          disable-animations: true
          emulator-boot-timeout: 600
          emulator-options: -no-snapshot-save -no-window -no-boot-anim -noaudio -gpu swiftshader_indirect -camera-back none
          pre-emulator-launch-script: |
            sudo apt-get update
            sudo apt-get install -y libpulse0
          script: API_LEVEL=${{ matrix.api-level }} bash testing/scripts/run_ci_instrumented_tests.sh
        timeout-minutes: 90