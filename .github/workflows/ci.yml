name: CI

on:
  push:
    branches: [main, develop, "release/*"]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Run unit tests
        run: ./gradlew test --no-daemon

  lint-detekt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: chmod +x gradlew
      - name: Run detekt
        run: ./gradlew detekt --no-daemon

  instrumented-api36:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: chmod +x gradlew
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      # Emulator merge gate: RMS signal-present (0.05) + engine state — not absolute 0.85 (see DESIGN.md Layer 2).
      - name: Instrumented tests API 36
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          target: google_apis
          arch: x86_64
          ram-size: 4096
          disable-animations: true
          emulator-boot-timeout: 600
          emulator-options: -no-snapshot-save -no-window -no-boot-anim -noaudio -gpu swiftshader_indirect -camera-back none
          pre-emulator-launch-script: |
            sudo apt-get update
            sudo apt-get install -y libpulse0
          script: API_LEVEL=36 bash testing/scripts/run_ci_instrumented_tests.sh
        timeout-minutes: 90
