name: Release

on:
  push:
    branches: [main]
    paths:
      - app/build.gradle.kts
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect version bump
        id: version
        run: |
          extract_version() {
            grep -E '^\s*versionName\s*=' "$1" | sed -E 's/.*"([^"]+)".*/\1/'
          }

          current=$(extract_version app/build.gradle.kts)
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            git show HEAD~1:app/build.gradle.kts > /tmp/previous-build.gradle.kts
            previous=$(extract_version /tmp/previous-build.gradle.kts)
          else
            previous=""
          fi

          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "previous=$previous" >> "$GITHUB_OUTPUT"

          if git rev-parse "v$current" >/dev/null 2>&1; then
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "Tag v$current already exists; skipping release."
          elif [ "$current" = "$previous" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "versionName unchanged ($current); skipping release."
          elif [ "$current" = "$previous" ]; then
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            echo "workflow_dispatch backfill for missing tag v$current"
          else
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            echo "versionName bumped: $previous -> $current"
          fi

      - name: Create GitHub Release
        if: steps.version.outputs.bumped == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.current }}
          name: v${{ steps.version.outputs.current }}
          generate_release_notes: true