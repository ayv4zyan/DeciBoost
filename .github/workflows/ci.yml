name: CI

on:
  push:
    branches: [main, develop, "release/*"]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Run unit tests
        run: ./gradlew :core:audio:policy:test :testing:fakes:test --no-daemon

  lint-detekt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: chmod +x gradlew
      - name: Run detekt
        run: ./gradlew detekt --no-daemon

  instrumented-api36:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: chmod +x gradlew
      # Emulator merge gate: RMS signal-present (0.05) + engine state — not absolute 0.85 (see DESIGN.md Layer 2).
      - name: Instrumented tests API 36
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          target: google_apis
          arch: x86_64
          ram-size: 4096
          emulator-options: -no-snapshot-save
          script: |
            set -euo pipefail
            attempt=0
            max_attempts=3
            while [ "$attempt" -lt "$max_attempts" ]; do
              attempt=$((attempt + 1))
              if ./gradlew :testing:audio-harness:connectedDebugAndroidTest :app:connectedDebugAndroidTest --no-daemon; then
                exit 0
              fi
              echo "Instrumented tests failed (attempt $attempt/$max_attempts), retrying..."
            done
            exit 1
        timeout-minutes: 75