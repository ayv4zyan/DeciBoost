name: Release

on:
  push:
    branches: [main]
    paths:
      - app/build.gradle.kts
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Detect version bump
        id: version
        run: |
          extract_version() {
            grep -E '^\s*versionName\s*=' "$1" | sed -E 's/.*"([^"]+)".*/\1/'
          }

          current=$(extract_version app/build.gradle.kts)
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            git show HEAD~1:app/build.gradle.kts > /tmp/previous-build.gradle.kts
            previous=$(extract_version /tmp/previous-build.gradle.kts)
          else
            previous=""
          fi

          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "previous=$previous" >> "$GITHUB_OUTPUT"

          tag_exists=false
          if git rev-parse "v$current" >/dev/null 2>&1; then
            tag_exists=true
          fi
          echo "tag_exists=$tag_exists" >> "$GITHUB_OUTPUT"

          if [ "$current" = "$previous" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "create_release=false" >> "$GITHUB_OUTPUT"
            echo "build_apk=false" >> "$GITHUB_OUTPUT"
            echo "versionName unchanged ($current); skipping release."
          elif [ "$tag_exists" = "true" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            echo "create_release=false" >> "$GITHUB_OUTPUT"
            echo "build_apk=false" >> "$GITHUB_OUTPUT"
            echo "Tag v$current already exists; skipping release."
          elif [ "$tag_exists" = "true" ]; then
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            echo "create_release=false" >> "$GITHUB_OUTPUT"
            echo "build_apk=true" >> "$GITHUB_OUTPUT"
            echo "workflow_dispatch upload for existing tag v$current"
          else
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            echo "create_release=true" >> "$GITHUB_OUTPUT"
            echo "build_apk=true" >> "$GITHUB_OUTPUT"
            echo "versionName bumped: $previous -> $current"
          fi

      - name: Build release APK
        if: steps.version.outputs.build_apk == 'true'
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
          cp app/build/outputs/apk/release/app-release.apk "DeciBoost-v${{ steps.version.outputs.current }}.apk"

      - name: Create GitHub Release
        if: steps.version.outputs.create_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.current }}
          name: v${{ steps.version.outputs.current }}
          generate_release_notes: true
          files: DeciBoost-v${{ steps.version.outputs.current }}.apk

      - name: Upload APK to existing release
        if: steps.version.outputs.create_release != 'true' && steps.version.outputs.build_apk == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "v${{ steps.version.outputs.current }}" \
            "DeciBoost-v${{ steps.version.outputs.current }}.apk" \
            --clobber